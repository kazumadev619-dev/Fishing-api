# lefthook.yml
pre-commit:
  parallel: false
  commands:
    gofumpt:
      glob: "*.go"
      run: $(go env GOPATH)/bin/gofumpt -w {staged_files}
      stage_fixed: true

    golangci-lint:
      glob: "*.go"
      run: golangci-lint run --fix --fast-only --no-config {staged_files}
      stage_fixed: true
